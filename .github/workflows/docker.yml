name: Build and push Docker image

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  GHCR_IMAGE: ghcr.io/brycepearce/plex-librarian
  DOCKERHUB_IMAGE: docker.io/edon231/plex-librarian

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set platform tag
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          shopt -s nullglob
          digest_files=(*)
          if (( ${#digest_files[@]} == 0 )); then
            echo "No platform digests were downloaded" >&2
            exit 1
          fi

          sources=()
          for digest in "${digest_files[@]}"; do
            sources+=("${GHCR_IMAGE}@sha256:${digest}")
          done

          ghcr_tags=(-t "${GHCR_IMAGE}:${COMMIT_SHA}")
          dockerhub_tags=(-t "${DOCKERHUB_IMAGE}:${COMMIT_SHA}")
          if [[ "${REF_TYPE}" == "tag" ]]; then
            version="${REF_NAME#v}"
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Release tag must match vMAJOR.MINOR.PATCH or a prerelease such as v1.2.3-beta.1" >&2
              exit 1
            fi

            ghcr_tags+=(-t "${GHCR_IMAGE}:${version}")
            dockerhub_tags+=(-t "${DOCKERHUB_IMAGE}:${version}")
            if [[ "${version}" != *-* ]]; then
              major="${version%%.*}"
              remainder="${version#*.}"
              minor="${remainder%%.*}"
              ghcr_tags+=(
                -t "${GHCR_IMAGE}:${major}.${minor}"
                -t "${GHCR_IMAGE}:${major}"
                -t "${GHCR_IMAGE}:latest"
              )
              dockerhub_tags+=(
                -t "${DOCKERHUB_IMAGE}:${major}.${minor}"
                -t "${DOCKERHUB_IMAGE}:${major}"
                -t "${DOCKERHUB_IMAGE}:latest"
              )
            fi
          else
            ghcr_tags+=(-t "${GHCR_IMAGE}:edge")
            dockerhub_tags+=(-t "${DOCKERHUB_IMAGE}:edge")
          fi

          docker buildx imagetools create "${ghcr_tags[@]}" "${sources[@]}"
          docker buildx imagetools create \
            "${dockerhub_tags[@]}" \
            "${GHCR_IMAGE}:${COMMIT_SHA}"

      - name: Inspect images
        run: |
          docker buildx imagetools inspect ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
