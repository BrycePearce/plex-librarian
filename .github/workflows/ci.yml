name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        working-directory: backend
        run: deno fmt --check src

      - name: Lint
        run: deno lint

      - name: Test
        run: deno test --allow-all backend/src frontend/src

      - name: Build frontend
        run: deno task build
